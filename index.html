<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hogwarts</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main>
      <h1>Hogwarts</h1>

      <input type="text" id="search" placeholder="Search student..." />

      <div>
        <button onclick="filterByHouse('Gryffindor')">Gryffindor</button>
        <button onclick="filterByHouse('Slytherin')">Slytherin</button>
        <button onclick="filterByHouse('Hufflepuff')">Hufflepuff</button>
        <button onclick="filterByHouse('Ravenclaw')">Ravenclaw</button>
        <button onclick="filterByHouse('all')">All</button>
      </div>

      <div>
        <button onclick="sortByAge('youngest')">Youngest to oldest</button>
        <button onclick="sortByAge('oldest')">Oldest to youngest</button>
      </div>

      <h2>⭐ Saved students</h2>
      <div id="saved-list"></div>
      <p id="save-message"></p>
      <h2>Add student</h2>

      <form id="add-student-form">
        <input type="text" id="name" placeholder="Name" required />
        <input type="text" id="house" placeholder="House" required />
        <input type="number" id="yearOfBirth" placeholder="Year of birth" />
        <input type="text" id="wandWood" placeholder="Wand wood" />
        <input type="text" id="wandCore" placeholder="Wand core" />
        <input type="number" id="wandLength" placeholder="Wand length" />
        <input type="text" id="image" placeholder="Image URL" />
        <button type="submit">Add student</button>
      </form>

      <h2>All students</h2>
      <div id="student-list"></div>
    </main>

    <script src="js/script.js"></script>
  </body>
</html>
