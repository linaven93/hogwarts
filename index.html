<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hogwarts</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main>
      <h1>Hogwarts</h1>

      <input type="text" id="search" placeholder="Search student..." />

      <div>
        <button onclick="filterByHouse('Gryffindor')">Gryffindor</button>
        <button onclick="filterByHouse('Slytherin')">Slytherin</button>
        <button onclick="filterByHouse('Hufflepuff')">Hufflepuff</button>
        <button onclick="filterByHouse('Ravenclaw')">Ravenclaw</button>
        <button onclick="filterByHouse('all')">All</button>
      </div>

      <h2>⭐ Saved students</h2>
      <div id="saved-list"></div>
      <p id="save-message"></p>

      <h2>All students</h2>
      <div id="student-list"></div>
    </main>

    <script src="js/script.js"></script>
  </body>
</html>
